global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "fraud-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Optional: scrape Prometheus itself
  - job_name: "prometheus"
    metrics_path: /prometheus/metrics
    static_configs:
      - targets: ["localhost:9090"]


